; NM-EPD-420 Factory Test Firmware
; PlatformIO + Arduino, board: lilygo-t-display-s3

[platformio]
default_envs = nm-epd-420

[env:nm-epd-420]
; pioarduino 54.x = arduino-esp32 3.1.x + ESP-IDF 5.3
; 升级原因: 启用 i2s_std 新 API 解决 ESP32-S3 上老 i2s driver MCLK/BCLK 分频错误问题
platform              = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.21/platform-espressif32.zip
framework             = arduino
board                 = lilygo-t-display-s3
monitor_speed         = 115200
board_build.flash_mode = dio
board_build.f_cpu     = 80000000L
board_build.partitions = huge_app.csv
board_build.arduino.memory_type = qio_opi

; After build, merge bootloader + partitions + app into a single firmware.bin
extra_scripts = post:scripts/merge_firmware.py

build_unflags = -std=gnu++11

build_flags =
    -Wall
    -std=gnu++17
    -Isrc
    -DBOARD_HAS_PSRAM
    -DDISABLE_DIAGNOSTIC_OUTPUT

lib_deps =
    zinggjm/GxEPD2 @ 1.6.8
    adafruit/Adafruit AHTX0 @ 2.0.5
    adafruit/Adafruit BusIO @ 1.17.4
    adafruit/Adafruit Unified Sensor @ 1.1.15
